name: Sandbox Images

on:
  push:
    branches: [main]
    paths:
      - 'sandbox/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      gcc-digest:    ${{ steps.gcc.outputs.digest }}
      python-digest: ${{ steps.python.outputs.digest }}
      node-digest:   ${{ steps.node.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push gcc sandbox
        id: gcc
        uses: docker/build-push-action@v5
        with:
          context: sandbox
          file: sandbox/gcc.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/web_ide/sandbox-gcc:sha-${{ github.sha }}

      - name: Build and push python sandbox
        id: python
        uses: docker/build-push-action@v5
        with:
          context: sandbox
          file: sandbox/python.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/web_ide/sandbox-python:sha-${{ github.sha }}

      - name: Build and push node sandbox
        id: node
        uses: docker/build-push-action@v5
        with:
          context: sandbox
          file: sandbox/node.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/web_ide/sandbox-node:sha-${{ github.sha }}

      - name: Save digests as artifact
        run: |
          mkdir -p sandbox-digests
          echo "${{ steps.gcc.outputs.digest }}"    > sandbox-digests/gcc.txt
          echo "${{ steps.python.outputs.digest }}" > sandbox-digests/python.txt
          echo "${{ steps.node.outputs.digest }}"   > sandbox-digests/node.txt
      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-digests
          path: sandbox-digests/
