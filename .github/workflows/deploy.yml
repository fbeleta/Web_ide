name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}/web_ide

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build a self-contained EF migration bundle from THIS commit so the
      # schema applied on the server always matches the image being deployed.
      # (The runtime app image has no SDK / dotnet-ef, so it cannot migrate itself.)
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build EF migration bundle
        run: |
          dotnet tool restore
          dotnet ef migrations bundle --force --self-contained -r linux-x64 \
            --project WebIde.DAL/WebIde.DAL.csproj \
            --startup-project WebIde.Frontend/WebIde.Frontend.csproj \
            -o efbundle

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 1: Capture rollback target BEFORE any push
      - name: Capture current :latest digest for rollback
        id: rollback
        run: |
          PREV=$(docker buildx imagetools inspect \
            ghcr.io/${{ env.NAMESPACE }}/app:latest \
            --format '{{json .Manifest.Digest}}' 2>/dev/null || echo '""')
          # Strip quotes if present
          PREV=$(echo "$PREV" | tr -d '"')
          echo "digest=$PREV" >> "$GITHUB_OUTPUT"

      # Step 2: Build and push :sha-X ONLY (no :latest yet)
      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: ghcr.io/${{ env.NAMESPACE }}/app:sha-${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ghcr.io/${{ env.NAMESPACE }}/worker:sha-${{ github.sha }}

      # Ship the migration bundle to the server before the deploy script runs it.
      - name: Copy migration bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: efbundle
          target: /opt/webide

      # Steps 3–6: SSH deploy, migrate, health check, promote or rollback
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          PREV_DIGEST: ${{ steps.rollback.outputs.digest }}
          NAMESPACE: ${{ env.NAMESPACE }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: IMAGE_TAG,PREV_DIGEST,NAMESPACE
          script: |
            set -euo pipefail
            cd /opt/webide

            IMAGE_TAG=$IMAGE_TAG docker compose pull webide-app webide-worker

            # Run EF migrations before bringing up the new app, using the
            # self-contained bundle shipped from CI. It runs inside the webide
            # network so it can reach postgres by hostname; runtime-deps supplies
            # the native libs the self-contained binary needs (no SDK required).
            set -a; . ./.env; set +a
            chmod +x efbundle
            docker run --rm \
              --network webide_webide-net \
              -v /opt/webide/efbundle:/efbundle:ro \
              mcr.microsoft.com/dotnet/runtime-deps:10.0 \
              /efbundle --connection "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"

            IMAGE_TAG=$IMAGE_TAG docker compose up -d webide-app webide-worker

            # Poll /health/ready for up to 60s
            SUCCESS=0
            for i in $(seq 1 30); do
              if curl -fsS -k https://localhost/health/ready > /dev/null 2>&1; then
                SUCCESS=1
                break
              fi
              sleep 2
            done

            if [ "$SUCCESS" -eq 0 ]; then
              echo "Health check failed — rolling back to $PREV_DIGEST"
              if [ -n "$PREV_DIGEST" ]; then
                IMAGE_TAG=$PREV_DIGEST docker compose up -d webide-app webide-worker
              fi
              exit 1
            fi

      # Step 5 (success path): promote :sha-X to :latest
      - name: Promote :latest
        if: success()
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.NAMESPACE }}/app:latest \
            ghcr.io/${{ env.NAMESPACE }}/app:sha-${{ github.sha }}
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.NAMESPACE }}/worker:latest \
            ghcr.io/${{ env.NAMESPACE }}/worker:sha-${{ github.sha }}

      - name: Prune old images on server
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: docker image prune -f
