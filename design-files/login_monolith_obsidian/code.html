<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "outline-variant": "#474747",
                "tertiary-container": "#929090",
                "primary-container": "#5fedb0",
                "surface-container-high": "#2a2a2a",
                "secondary": "#c8c6c5",
                "primary-fixed": "#006c4a",
                "on-surface-variant": "#c6c6c6",
                "on-primary-fixed": "#ffffff",
                "on-secondary-fixed": "#1c1b1b",
                "on-secondary-fixed-variant": "#3c3b3b",
                "surface-container-lowest": "#0e0e0e",
                "surface-container-low": "#1c1b1b",
                "on-primary": "#002114",
                "error-container": "#93000a",
                "inverse-on-surface": "#313030",
                "on-primary-fixed-variant": "#6ffbbe",
                "inverse-surface": "#e5e2e1",
                "primary": "#ffffff",
                "on-secondary": "#1c1b1b",
                "on-primary-container": "#000000",
                "on-surface": "#e5e2e1",
                "surface-tint": "#4edea3",
                "on-secondary-container": "#e5e2e1",
                "surface-dim": "#131313",
                "surface-bright": "#3a3939",
                "surface": "#131313",
                "primary-fixed-dim": "#005236",
                "secondary-fixed-dim": "#adabaa",
                "tertiary-fixed-dim": "#474746",
                "inverse-primary": "#006c4a",
                "error": "#ffb4ab",
                "on-tertiary-fixed-variant": "#e4e2e1",
                "on-tertiary-container": "#000000",
                "secondary-fixed": "#c8c6c5",
                "on-background": "#e5e2e1",
                "on-error": "#690005",
                "background": "#131313",
                "on-tertiary": "#1b1c1c",
                "surface-variant": "#353534",
                "surface-container": "#201f1f",
                "tertiary-fixed": "#5f5e5e",
                "secondary-container": "#474746",
                "on-tertiary-fixed": "#ffffff",
                "on-error-container": "#ffdad6",
                "outline": "#919191",
                "surface-container-highest": "#353534",
                "tertiary": "#e4e2e1"
            },
            "borderRadius": {
                "DEFAULT": "0px",
                "lg": "0px",
                "xl": "0px",
                "full": "0px"
            },
            "fontFamily": {
                "headline": ["Space Grotesk"],
                "body": ["Space Grotesk"],
                "label": ["Space Grotesk"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none !important;
            box-shadow: none !important;
        }
        .monolith-gradient {
            background: linear-gradient(135deg, #4edea3 0%, #006c4a 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#131313] text-primary font-body antialiased min-h-screen flex flex-col">
<!-- Top Navigation Suppression (Transactional Page) -->
<header class="flex items-center justify-between px-6 h-16 w-full border-b border-[#2a2a2a] bg-[#131313]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-white" data-icon="terminal">terminal</span>
<span class="text-xl font-bold tracking-tighter text-white font-headline">MONOLITH_IDE</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
<!-- Abstract Background Detail -->
<div class="absolute inset-0 opacity-10 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] border border-outline-variant rotate-12"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[60%] border-l border-t border-outline-variant -rotate-6"></div>
</div>
<div class="w-full max-w-md z-10">
<!-- Branding/Title Section -->
<div class="mb-12 border-l-2 border-surface-tint pl-6">
<h1 class="text-5xl font-bold tracking-tighter text-white mb-2 font-headline uppercase">LOGIN</h1>
<p class="text-on-surface-variant text-sm tracking-wide">Access the Obsidian Monolith core interface.</p>
</div>
<!-- Login Form -->
<form class="space-y-8">
<div class="space-y-6">
<!-- Field 1 -->
<div class="group">
<label class="block text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-2 group-focus-within:text-surface-tint transition-colors">Identification</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant p-4 text-primary placeholder:text-outline focus:border-surface-tint transition-all rounded-none" placeholder="Username or Email" type="text"/>
</div>
<!-- Field 2 -->
<div class="group">
<label class="block text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-2 group-focus-within:text-surface-tint transition-colors">Access Key</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant p-4 text-primary placeholder:text-outline focus:border-surface-tint transition-all rounded-none" placeholder="Password" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full monolith-gradient text-on-primary font-bold py-4 px-6 tracking-widest hover:opacity-90 transition-opacity flex items-center justify-center gap-2 group" type="submit">
                    AUTHENTICATE
                    <span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-1" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Secondary Links -->
<div class="flex justify-between items-center pt-2">
<a class="text-xs text-on-surface-variant hover:text-white transition-colors underline decoration-outline-variant underline-offset-4" href="#">Forgot Password</a>
<a class="text-xs text-on-surface-variant hover:text-white transition-colors underline decoration-outline-variant underline-offset-4" href="#">Register</a>
</div>
</form>
<!-- SSO Section -->
<div class="mt-16">
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="text-[10px] uppercase tracking-[0.3em] text-outline">External Protocols</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 border border-outline-variant py-3 px-4 text-sm text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="terminal">terminal</span>
                        GitHub
                    </button>
<button class="flex items-center justify-center gap-3 border border-outline-variant py-3 px-4 text-sm text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="language">language</span>
                        Google
                    </button>
</div>
</div>
</div>
</main>
<!-- Bottom Nav Suppression (Transactional Page) -->
<footer class="p-6 border-t border-[#2a2a2a] flex justify-between items-center bg-[#131313]">
<div class="text-[10px] text-outline tracking-widest">SYSTEM STATUS: NOMINAL</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-outline text-xs" data-icon="verified_user">verified_user</span>
<span class="material-symbols-outlined text-outline text-xs" data-icon="encrypted">encrypted</span>
</div>
</footer>
</body></html>
