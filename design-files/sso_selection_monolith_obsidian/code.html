<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "outline-variant": "#474747",
                "tertiary-container": "#929090",
                "primary-container": "#5fedb0",
                "surface-container-high": "#2a2a2a",
                "secondary": "#c8c6c5",
                "primary-fixed": "#006c4a",
                "on-surface-variant": "#c6c6c6",
                "on-primary-fixed": "#ffffff",
                "on-secondary-fixed": "#1c1b1b",
                "on-secondary-fixed-variant": "#3c3b3b",
                "surface-container-lowest": "#0e0e0e",
                "surface-container-low": "#1c1b1b",
                "on-primary": "#002114",
                "error-container": "#93000a",
                "inverse-on-surface": "#313030",
                "on-primary-fixed-variant": "#6ffbbe",
                "inverse-surface": "#e5e2e1",
                "primary": "#ffffff",
                "on-secondary": "#1c1b1b",
                "on-primary-container": "#000000",
                "on-surface": "#e5e2e1",
                "surface-tint": "#4edea3",
                "on-secondary-container": "#e5e2e1",
                "surface-dim": "#131313",
                "surface-bright": "#3a3939",
                "surface": "#131313",
                "primary-fixed-dim": "#005236",
                "secondary-fixed-dim": "#adabaa",
                "tertiary-fixed-dim": "#474746",
                "inverse-primary": "#006c4a",
                "error": "#ffb4ab",
                "on-tertiary-fixed-variant": "#e4e2e1",
                "on-tertiary-container": "#000000",
                "secondary-fixed": "#c8c6c5",
                "on-background": "#e5e2e1",
                "on-error": "#690005",
                "background": "#131313",
                "on-tertiary": "#1b1c1c",
                "surface-variant": "#353534",
                "surface-container": "#201f1f",
                "tertiary-fixed": "#5f5e5e",
                "secondary-container": "#474746",
                "on-tertiary-fixed": "#ffffff",
                "on-error-container": "#ffdad6",
                "outline": "#919191",
                "surface-container-highest": "#353534",
                "tertiary": "#e4e2e1"
            },
            "borderRadius": {
                "DEFAULT": "0px",
                "lg": "0px",
                "xl": "0px",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Space Grotesk"],
                "body": ["Space Grotesk"],
                "label": ["Space Grotesk"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #131313; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="bg-[#131313] dark:bg-[#131313] flex items-center justify-between px-6 h-16 w-full border-b border-[#2a2a2a] fixed top-0 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white" data-icon="terminal">terminal</span>
<span class="text-xl font-bold tracking-tighter text-white font-['Space_Grotesk']">MONOLITH_IDE</span>
</div>
<div class="hidden md:flex items-center gap-6">
<a class="text-[#4edea3] font-['Space_Grotesk'] tracking-tighter text-sm" href="#">AUTHENTICATE</a>
<a class="text-[#c6c6c6] hover:bg-[#2a2a2a] transition-colors px-3 py-1 font-['Space_Grotesk'] tracking-tighter text-sm" href="#">DOCUMENTATION</a>
</div>
</header>
<!-- Main Content: The Centered Monolith -->
<main class="flex-grow flex items-center justify-center p-6 mt-16 mb-16">
<div class="w-full max-w-md bg-surface-container-lowest p-1 border-l-2 border-surface-tint">
<div class="bg-surface p-8 md:p-12">
<!-- Branding & Title -->
<div class="mb-12">
<button class="flex items-center gap-2 text-surface-tint hover:opacity-80 transition-opacity mb-8 group">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
<span class="text-xs font-bold tracking-widest uppercase">Back</span>
</button>
<h1 class="text-5xl font-bold tracking-[-0.04em] text-primary mb-2">AUTHENTICATE</h1>
<p class="text-on-surface-variant text-sm font-light tracking-wide">Access the Monolith Obsidian secure ledger.</p>
</div>
<!-- SSO Options -->
<div class="space-y-4">
<!-- GitHub SSO -->
<button class="w-full h-14 flex items-center px-6 border border-outline-variant hover:bg-surface-container-high transition-colors group relative overflow-hidden">
<div class="absolute inset-y-0 left-0 w-0 bg-surface-tint group-hover:w-1 transition-all"></div>
<span class="material-symbols-outlined text-white mr-4" data-icon="code">code</span>
<span class="text-primary font-medium tracking-tight">Continue with Github</span>
<span class="material-symbols-outlined ml-auto text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Google SSO -->
<button class="w-full h-14 flex items-center px-6 border border-outline-variant hover:bg-surface-container-high transition-colors group relative overflow-hidden">
<div class="absolute inset-y-0 left-0 w-0 bg-surface-tint group-hover:w-1 transition-all"></div>
<span class="material-symbols-outlined text-white mr-4" data-icon="language">language</span>
<span class="text-primary font-medium tracking-tight">Continue with Google</span>
<span class="material-symbols-outlined ml-auto text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Enterprise SSO -->
<button class="w-full h-14 flex items-center px-6 border border-outline-variant hover:bg-surface-container-high transition-colors group relative overflow-hidden">
<div class="absolute inset-y-0 left-0 w-0 bg-surface-tint group-hover:w-1 transition-all"></div>
<span class="material-symbols-outlined text-white mr-4" data-icon="corporate_fare">corporate_fare</span>
<span class="text-primary font-medium tracking-tight">Enterprise SSO</span>
<span class="material-symbols-outlined ml-auto text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Technical Metadata / Footer inside card -->
<div class="mt-12 pt-8 border-t border-outline-variant/30 flex flex-col gap-2">
<div class="flex justify-between items-center text-[10px] text-outline tracking-[0.2em] font-bold">
<span>SYSTEM_ID: OB-88-231</span>
<span class="text-surface-tint">ENCRYPTED</span>
</div>
<p class="text-[10px] text-on-surface-variant leading-relaxed">
                        By authenticating, you agree to the Monolith protocols and architectural governance standards.
                    </p>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell (Mobile Only Suppression Logic Check: High-level destination = No, so we render as task-focused but JSON requires presence for top-level context) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-16 bg-[#131313]/80 backdrop-blur-xl border-t border-[#2a2a2a] md:hidden">
<a class="flex flex-col items-center justify-center text-[#4edea3] scale-110 transition-all duration-300 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="login">login</span>
</a>
<a class="flex flex-col items-center justify-center text-[#474747] hover:text-white transition-all duration-300 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
</a>
<a class="flex flex-col items-center justify-center text-[#474747] hover:text-white transition-all duration-300 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
</a>
</nav>
<!-- Decorative Monolith Background Element -->
<div class="fixed top-0 right-0 h-screen w-1/3 bg-gradient-to-l from-surface-container-lowest to-transparent pointer-events-none opacity-50 z-[-1]"></div>
<div class="fixed bottom-0 left-0 p-8 pointer-events-none z-[-1]">
<div class="w-64 h-64 border-l border-b border-outline-variant opacity-20"></div>
</div>
</body></html>
