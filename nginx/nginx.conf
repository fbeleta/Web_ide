worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Cloudflare real IP — without this, all users share one rate limit bucket ─
    # Cloudflare IPv4 ranges: https://www.cloudflare.com/ips-v4/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # Cloudflare IPv6 ranges: https://www.cloudflare.com/ips-v6/
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Rate limit zones (outer defense — ASP.NET has inner limits in Program.cs) ─
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=30r/m;
    limit_req_zone $binary_remote_addr zone=submit:10m rate=10r/m;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json;

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # Cert paths match certbot Let's Encrypt layout so prod requires no changes.
        # For local dev, generate-self-signed.sh creates certs at these paths.
        ssl_certificate     /etc/letsencrypt/live/localhost/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options   "nosniff"                             always;
        add_header X-Frame-Options          "SAMEORIGIN"                          always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"     always;

        client_max_body_size 12m;

        # ── ACME challenge (Let's Encrypt renewal) ─────────────────────────
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        # ── Auth endpoints — rate limited ──────────────────────────────────
        location /auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://webide-app:8080;
            include /etc/nginx/proxy_pass.conf;
        }

        # ── Submission endpoint — rate limited ─────────────────────────────
        location /submissions {
            limit_req zone=submit burst=5 nodelay;
            proxy_pass http://webide-app:8080;
            include /etc/nginx/proxy_pass.conf;
        }

        # ── SignalR WebSocket upgrade ──────────────────────────────────────
        location /hubs/ {
            proxy_pass http://webide-app:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            include /etc/nginx/proxy_pass.conf;
        }

        # ── Everything else ────────────────────────────────────────────────
        location / {
            proxy_pass http://webide-app:8080;
            include /etc/nginx/proxy_pass.conf;
        }
    }

    # ── HTTP redirect to HTTPS ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow ACME challenge through on port 80 for initial cert issuance
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }
}
