services:
  postgres:
    image: postgres:16
    container_name: webide_postgres
    environment:
      POSTGRES_USER: webide
      POSTGRES_PASSWORD: webide_dev
      POSTGRES_DB: webide
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: webide_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@webide.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
